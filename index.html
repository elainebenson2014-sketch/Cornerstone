<!-- Cornerstone — Church Connection Hub. Authenticates against the same Supabase project as Kingdom Stewardship Pro. -->
<div id="app-root"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0f1626; --bg-2:#131c30; --surface:#18233b; --surface-2:#1f2c47; --line:#2a3a5c;
    --ink:#eef2fb; --ink-soft:#aab6d0; --ink-faint:#6c7a99;
    --gold:#d9b25b; --gold-soft:#f0d99b; --green:#6fcf97; --blue:#6fa8df; --rose:#e08a8a; --violet:#b89be0;
    --radius:14px; --shadow:0 18px 40px -20px rgba(0,0,0,.7);
    --display:'Fraunces',Georgia,serif; --body:'Hanken Grotesk',system-ui,sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  #app-root {
    font-family:var(--body); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(217,178,91,.10), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(111,168,223,.08), transparent 55%), var(--bg);
    min-height:100vh;
  }
  .wrap { max-width:1120px; margin:0 auto; padding:26px 20px 90px; }
  header.app-head { display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:22px; border-bottom:1px solid var(--line); padding-bottom:20px; }
  .brand { display:flex; align-items:center; gap:14px; }
  .crest { width:46px; height:46px; border-radius:12px; flex:none; background:linear-gradient(150deg,var(--gold),#9c7d31); display:grid; place-items:center; color:#1b1303; box-shadow:var(--shadow); }
  .crest svg { width:26px; height:26px; }
  .brand h1 { font-family:var(--display); font-weight:600; font-size:26px; letter-spacing:-.01em; line-height:1; }
  .brand .sub { color:var(--ink-faint); font-size:12px; letter-spacing:.05em; text-transform:uppercase; margin-top:5px; }
  .head-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

  button,.btn { font-family:var(--body); font-size:13.5px; font-weight:600; border:1px solid var(--line); background:var(--surface); color:var(--ink); padding:9px 14px; border-radius:10px; cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:7px; }
  button:hover { border-color:var(--gold); color:var(--gold-soft); }
  .btn-primary { background:linear-gradient(150deg,var(--gold),#b8932f); color:#1b1303; border-color:transparent; }
  .btn-primary:hover { filter:brightness(1.07); color:#1b1303; }
  .btn-ghost { background:transparent; }
  .btn-danger { background:rgba(224,138,138,.14); border-color:rgba(224,138,138,.4); color:var(--rose); }
  .btn-danger:hover { background:var(--rose); color:#2a0d0d; border-color:var(--rose); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .icon-btn { padding:7px; border-radius:8px; }

  nav.tabs { display:flex; gap:5px; margin-bottom:24px; flex-wrap:wrap; }
  nav.tabs button { background:transparent; border:1px solid transparent; color:var(--ink-soft); padding:8px 13px; border-radius:999px; font-size:13px; }
  nav.tabs button.active { background:var(--surface); border-color:var(--line); color:var(--ink); }
  nav.tabs button .badge { background:var(--rose); color:#2a0d0d; font-size:10px; font-weight:700; border-radius:999px; padding:1px 6px; margin-left:3px; }

  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:13px; margin-bottom:24px; }
  .stat { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:17px 17px 15px; position:relative; overflow:hidden; }
  .stat::after { content:''; position:absolute; inset:0 auto 0 0; width:3px; background:var(--gold); opacity:.6; }
  .stat .n { font-family:var(--display); font-size:29px; font-weight:600; line-height:1; }
  .stat .l { color:var(--ink-faint); font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; margin-top:9px; }
  .stat.green .n{color:var(--green)} .stat.green::after{background:var(--green)}
  .stat.blue .n{color:var(--blue)} .stat.blue::after{background:var(--blue)}
  .stat.rose .n{color:var(--rose)} .stat.rose::after{background:var(--rose)}
  .stat.violet .n{color:var(--violet)} .stat.violet::after{background:var(--violet)}
  .stat.gold .n{color:var(--gold-soft)}

  .section-title { font-family:var(--display); font-size:18px; color:var(--ink); margin:6px 0 13px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .section-title .sub { font-family:var(--body); font-size:12.5px; color:var(--ink-faint); font-weight:400; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:780px){ .grid2 { grid-template-columns:1fr; } }

  .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .search { flex:1; min-width:200px; position:relative; }
  .search input { width:100%; padding:10px 12px 10px 36px; }
  .search svg { position:absolute; left:11px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--ink-faint); }
  input,select,textarea { font-family:var(--body); font-size:14px; color:var(--ink); background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:10px 12px; width:100%; }
  input:focus,select:focus,textarea:focus { outline:none; border-color:var(--gold); }
  select { cursor:pointer; }

  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:14px; }
  .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; transition:.15s; position:relative; }
  .card.click { cursor:pointer; }
  .card.click:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:var(--shadow); }

  .member.selectable { padding-left:44px; }
  .member.selected { border-color:var(--gold); background:var(--surface-2); }
  .member .checkbox { position:absolute; left:14px; top:16px; width:20px; height:20px; border-radius:6px; border:1.5px solid var(--line); display:grid; place-items:center; font-size:13px; font-weight:700; color:#1b1303; }
  .member .checkbox.on { background:var(--gold); border-color:var(--gold); }
  .top { display:flex; align-items:center; gap:12px; margin-bottom:11px; }
  .avatar { width:42px; height:42px; border-radius:50%; flex:none; display:grid; place-items:center; font-weight:700; font-size:15px; color:#1b1303; background:linear-gradient(150deg,var(--gold-soft),var(--gold)); }
  .name { font-family:var(--display); font-weight:600; font-size:17px; }
  .house { color:var(--ink-faint); font-size:12.5px; }
  .pill { font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; letter-spacing:.03em; text-transform:uppercase; white-space:nowrap; }
  .pill.member{background:rgba(217,178,91,.16); color:var(--gold-soft)}
  .pill.regular{background:rgba(111,168,223,.16); color:var(--blue)}
  .pill.visitor{background:rgba(224,138,138,.15); color:var(--rose)}
  .meta { display:flex; flex-direction:column; gap:5px; font-size:12.5px; color:var(--ink-soft); }
  .meta div { display:flex; align-items:center; gap:7px; }
  .tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:11px; }
  .tag { font-size:11px; background:var(--surface-2); border:1px solid var(--line); color:var(--ink-soft); padding:2px 8px; border-radius:6px; }
  .steward-bar { margin-top:12px; }
  .steward-bar .track { height:6px; background:var(--bg-2); border-radius:999px; overflow:hidden; }
  .steward-bar .fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-soft)); }
  .steward-bar .lab { display:flex; justify-content:space-between; font-size:11px; color:var(--ink-faint); margin-bottom:5px; }
  .linkchip { font-size:11px; color:var(--green); }

  .ann { border-left:3px solid var(--gold); }
  .ann.pinned { background:linear-gradient(180deg,rgba(217,178,91,.07),transparent); }
  .ann h4 { font-family:var(--display); font-size:17px; font-weight:600; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .ann .when { font-size:11.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; }
  .ann .body { font-size:13.5px; color:var(--ink-soft); margin-top:9px; white-space:pre-wrap; }
  .chip-cat { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; padding:2px 8px; border-radius:6px; background:var(--surface-2); color:var(--ink-soft); border:1px solid var(--line); }

  .event .datebox { width:50px; flex:none; text-align:center; background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:7px 0; }
  .event .datebox .mo { font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--gold-soft); font-weight:700; }
  .event .datebox .dy { font-family:var(--display); font-size:22px; font-weight:600; line-height:1.1; }
  .event .when2 { font-size:12.5px; color:var(--ink-soft); }

  .care.open { border-left:3px solid var(--rose); }
  .care.progress { border-left:3px solid var(--blue); }
  .care.closed { border-left:3px solid var(--ink-faint); opacity:.78; }
  .care .type { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--violet); }
  .lock { font-size:11px; color:var(--ink-faint); }

  .board { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:780px){ .board { grid-template-columns:1fr; } }
  .col { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; }
  .col h4 { font-family:var(--display); font-size:16px; font-weight:600; margin-bottom:4px; display:flex; justify-content:space-between; }
  .col .cnt { color:var(--ink-faint); font-size:13px; }
  .col .person { background:var(--bg-2); border:1px solid var(--line); border-radius:9px; padding:9px 11px; margin-top:9px; display:flex; justify-content:space-between; align-items:center; gap:8px; font-size:13.5px; }
  .col .person .adv { font-size:11px; padding:4px 8px; }

  .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-head h3 { font-family:var(--display); font-size:20px; font-weight:600; }
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
  .cal .dow { text-align:center; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); padding-bottom:4px; }
  .cal .cell { background:var(--surface); border:1px solid var(--line); border-radius:9px; min-height:78px; padding:6px; font-size:12px; }
  .cal .cell.empty { background:transparent; border-color:transparent; }
  .cal .cell.today { border-color:var(--gold); }
  .cal .cell .dnum { color:var(--ink-faint); font-weight:600; font-size:11.5px; }
  .cal .cell.today .dnum { color:var(--gold-soft); }
  .cal .ev { background:rgba(217,178,91,.16); color:var(--gold-soft); border-radius:5px; padding:2px 5px; margin-top:3px; font-size:10.5px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .ledger { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .ledger table { width:100%; border-collapse:collapse; font-size:14px; }
  .ledger th { text-align:left; padding:12px 15px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); border-bottom:1px solid var(--line); }
  .ledger td { padding:12px 15px; border-bottom:1px solid var(--line); color:var(--ink-soft); }
  .ledger tr:last-child td { border-bottom:none; }
  .ledger tr.click { cursor:pointer; }
  .ledger tr.click:hover td { background:var(--surface-2); }
  .ledger td.amt,.ledger th.amt { text-align:right; }
  .ledger td.amt { color:var(--gold-soft); font-weight:600; font-variant-numeric:tabular-nums; }
  .note { font-size:12.5px; color:var(--ink-faint); margin-top:14px; line-height:1.6; }

  .empty { text-align:center; padding:54px 20px; color:var(--ink-faint); }
  .empty svg { width:44px; height:44px; opacity:.35; margin-bottom:12px; }
  .selbar { display:flex; align-items:center; justify-content:space-between; gap:12px; background:var(--surface-2); border:1px solid var(--gold); border-radius:12px; padding:11px 15px; margin-bottom:16px; font-size:13.5px; color:var(--gold-soft); flex-wrap:wrap; }

  .sync-chip { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:999px; cursor:pointer; border:1px solid var(--line); }
  .sync-chip .dot { width:8px; height:8px; border-radius:50%; }
  .sync-chip.on { color:var(--green); border-color:rgba(111,207,151,.4); background:rgba(111,207,151,.08); }
  .sync-chip.on .dot { background:var(--green); box-shadow:0 0 8px var(--green); }
  .sync-chip.off { color:var(--ink-faint); }
  .sync-chip.off .dot { background:var(--ink-faint); }
  .sync-chip:hover { border-color:var(--gold); }

  .overlay { position:fixed; inset:0; background:rgba(6,10,20,.72); backdrop-filter:blur(4px); display:grid; place-items:center; padding:20px; z-index:50; }
  .modal { background:var(--bg-2); border:1px solid var(--line); border-radius:18px; width:100%; max-width:560px; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); }
  .modal .m-head { display:flex; justify-content:space-between; align-items:center; padding:18px 22px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg-2); z-index:2; }
  .modal .m-head h2 { font-family:var(--display); font-size:21px; font-weight:600; }
  .modal .m-body { padding:18px 22px; display:flex; flex-direction:column; gap:14px; }
  .field label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-faint); margin-bottom:6px; }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:560px){ .row2 { grid-template-columns:1fr; } }
  .modal .m-foot { padding:15px 22px; border-top:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; position:sticky; bottom:0; background:var(--bg-2); }
  .x { background:transparent; border:none; color:var(--ink-faint); font-size:22px; line-height:1; cursor:pointer; padding:0 4px; }
  .x:hover { color:var(--rose); }
  .check-row { display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--ink-soft); }
  .check-row input { width:auto; }
  .giving-row { display:flex; justify-content:space-between; font-size:13px; background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:8px 11px; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface-2); border:1px solid var(--gold); color:var(--gold-soft); padding:11px 18px; border-radius:10px; font-size:13.5px; z-index:99; box-shadow:var(--shadow); max-width:90%; text-align:center; }
  .loading { text-align:center; padding:80px; color:var(--ink-faint); font-family:var(--display); font-size:18px; }

  /* auth screens */
  .gate { min-height:100vh; display:grid; place-items:center; padding:24px; }
  .gate-card { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--line); border-radius:20px; padding:30px 28px; box-shadow:var(--shadow); }
  .gate-card .crest { margin:0 auto 16px; }
  .gate-card h2 { font-family:var(--display); font-size:24px; font-weight:600; text-align:center; }
  .gate-card p.tag { text-align:center; color:var(--ink-faint); font-size:13px; margin-top:6px; margin-bottom:22px; }
  .gate-card .field { margin-bottom:13px; }
  .gate-card .err { color:var(--rose); font-size:13px; text-align:center; margin-top:6px; min-height:18px; }
  .gate-card .alt { text-align:center; font-size:12.5px; color:var(--ink-faint); margin-top:16px; }
  .gate-card .alt a { color:var(--gold-soft); cursor:pointer; text-decoration:underline; }
</style>

<script>
(function () {
  const root = document.getElementById('app-root');

  const MINISTRIES = ['Worship','Youth','Children','Outreach','Hospitality','Prayer','Small Group','Finance Team'];
  const KW_STAGES = ['Not enrolled','Foundations','Money Mastery','Wealth Building','Generosity / Multiplier'];
  const CARE_TYPES = ['Grief / Bereavement','Illness','Hospital visit','Prayer request','Meal train','Home visit','Counseling','New-parent','Financial hardship','Other'];
  const CARE_STATUS = ['Open','In progress','Closed'];
  const GROUP_TYPES = ['Small Group','Ministry','Class','Committee'];
  const EVENT_CATS = ['Service','Group','Outreach','Youth','Children','Special','Care'];
  const ANN_CATS = ['General','Urgent','Worship','Events','Giving','Care'];
  const WELCOME_STEPS = ['Welcome contact made','Connect card received','Invited to a group','Newcomer lunch','Attends regularly','Completed membership class'];

  // table names
  const T = { members:'cstone_members', announcements:'cstone_announcements', events:'cstone_events', groups:'cstone_groups', care:'cstone_care' };
  const JSON_COLLS = ['announcements','events','groups','care'];

  let store = { members:[], announcements:[], events:[], groups:[], care:[] };
  let donors = [];        // read-only from ksp_donors
  let txCache = {};        // donor_id -> [transactions]
  let tab = 'dashboard', query = '', filterStatus = 'all';
  let editing = null, selectMode = false, selected = {};
  let showSettings = false, authMode = 'signin';
  let calCursor = new Date(); calCursor.setDate(1);
  let ready = false, booting = true;
  let cfg = { url:'', key:'' };
  let session = null;      // { token, refresh, userId, email }
  let online = false;      // authenticated to Supabase
  let busy = false, authErr = '';

  /* helpers */
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const initials = n => (n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const money = n => '$'+(Number(n)||0).toLocaleString(undefined,{maximumFractionDigits:0});
  const todayISO = () => new Date().toISOString().slice(0,10);
  function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso+'T00:00:00'); return isNaN(d)?iso:d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
  function fmt12(t){ if(!t) return ''; const [h,m]=String(t).split(':').map(Number); if(isNaN(h)) return t; const ap=h>=12?'PM':'AM'; return (((h+11)%12)+1)+(m?':'+String(m).padStart(2,'0'):'')+' '+ap; }
  function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2800); }
  const byId = (coll,id) => store[coll].find(x=>x.id===id);
  const personName = id => { const m=byId('members',id); return m?m.name:''; };
  const donorById = id => donors.find(d=>d.id===id);
  const donorTotal = m => { const d=m.donorId?donorById(m.donorId):null; return d?Number(d.total_given)||0:0; };

  /* ---------- Supabase auth + data ---------- */
  const restUrl = table => cfg.url.replace(/\/+$/,'') + '/rest/v1/' + table;
  const authUrl = path => cfg.url.replace(/\/+$/,'') + '/auth/v1/' + path;

  async function signIn(email,password){
    const res = await fetch(authUrl('token?grant_type=password'), { method:'POST', headers:{ apikey:cfg.key, 'Content-Type':'application/json' }, body:JSON.stringify({email,password}) });
    const d = await res.json();
    if(!res.ok) throw new Error(d.error_description||d.msg||d.error||'Sign-in failed');
    return { token:d.access_token, refresh:d.refresh_token, userId:d.user&&d.user.id, email:d.user&&d.user.email };
  }
  async function signUp(email,password){
    const res = await fetch(authUrl('signup'), { method:'POST', headers:{ apikey:cfg.key, 'Content-Type':'application/json' }, body:JSON.stringify({email,password}) });
    const d = await res.json();
    if(!res.ok) throw new Error(d.error_description||d.msg||d.error||'Sign-up failed');
    if(d.access_token) return { token:d.access_token, refresh:d.refresh_token, userId:d.user&&d.user.id, email:d.user&&d.user.email };
    return null; // email confirmation required
  }
  async function refreshSession(refresh){
    const res = await fetch(authUrl('token?grant_type=refresh_token'), { method:'POST', headers:{ apikey:cfg.key, 'Content-Type':'application/json' }, body:JSON.stringify({refresh_token:refresh}) });
    const d = await res.json();
    if(!res.ok) throw new Error('session expired');
    return { token:d.access_token, refresh:d.refresh_token, userId:d.user&&d.user.id, email:d.user&&d.user.email };
  }
  async function authedFetch(url, opts, retry){
    opts = opts||{};
    opts.headers = Object.assign({ apikey:cfg.key, Authorization:'Bearer '+session.token, 'Content-Type':'application/json' }, opts.headers||{});
    const res = await fetch(url, opts);
    if(res.status===401 && !retry && session.refresh){
      try { session = await refreshSession(session.refresh); await saveSession(); return authedFetch(url,opts,true); } catch(e){}
    }
    return res;
  }
  async function sbSelect(table, qs){ const res=await authedFetch(restUrl(table)+'?'+(qs||'select=*')); if(!res.ok) throw new Error('HTTP '+res.status+' on '+table); return res.json(); }
  async function sbUpsert(table, rows){ const res=await authedFetch(restUrl(table),{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(Array.isArray(rows)?rows:[rows])}); if(!res.ok) throw new Error('HTTP '+res.status+' — '+(await res.text()).slice(0,140)); }
  async function sbDelete(table, ids){ if(!ids.length) return; const list=ids.map(id=>'"'+String(id).replace(/"/g,'')+'"').join(','); const res=await authedFetch(restUrl(table)+'?id=in.('+encodeURIComponent(list)+')',{method:'DELETE',headers:{Prefer:'return=minimal'}}); if(!res.ok) throw new Error('HTTP '+res.status); }

  /* row mapping */
  function memberToRow(m){ return { id:m.id, user_id:session.userId, name:m.name, household:m.household||null, status:m.status||'Visitor', phone:m.phone||null, email:m.email||null, address:m.address||null, join_date:m.joinDate||null, ministries:m.ministries||[], kw_stage:m.kwStage||'Not enrolled', pledge:Number(m.pledge)||0, donor_id:m.donorId||null, onboarding:m.onboarding||[], notes:m.notes||null }; }
  function memberFromRow(r){ const arr=v=>Array.isArray(v)?v:(typeof v==='string'&&v?(()=>{try{return JSON.parse(v)}catch(e){return[]}})():[]); return { id:r.id, name:r.name||'', household:r.household||'', status:r.status||'Visitor', phone:r.phone||'', email:r.email||'', address:r.address||'', joinDate:r.join_date||'', ministries:arr(r.ministries), kwStage:r.kw_stage||'Not enrolled', pledge:Number(r.pledge)||0, donorId:r.donor_id||'', onboarding:arr(r.onboarding), notes:r.notes||'' }; }
  const jsonToRow = o => ({ id:o.id, user_id:session.userId, data:o });

  /* ---------- storage ---------- */
  async function loadConfig(){ try{ const r=await window.storage.get('sb_config'); if(r&&r.value) cfg=Object.assign(cfg,JSON.parse(r.value)); }catch(e){} }
  async function saveConfig(){ try{ await window.storage.set('sb_config',JSON.stringify(cfg)); }catch(e){} }
  async function loadSession(){ try{ const r=await window.storage.get('sb_session'); return r&&r.value?JSON.parse(r.value):null; }catch(e){ return null; } }
  async function saveSession(){ try{ await window.storage.set('sb_session',JSON.stringify({refresh:session.refresh})); }catch(e){} }
  async function clearSession(){ try{ await window.storage.set('sb_session',''); }catch(e){} }
  async function loadLocal(){ for(const k of Object.keys(store)){ try{ const r=await window.storage.get('coll_'+k); store[k]=r&&r.value?JSON.parse(r.value):[]; }catch(e){ store[k]=[]; } } }
  async function saveLocal(k){ try{ await window.storage.set('coll_'+k,JSON.stringify(store[k])); }catch(e){} }

  async function loadAllFromCloud(){
    store.members = (await sbSelect(T.members)).map(memberFromRow);
    for(const k of JSON_COLLS){ store[k] = (await sbSelect(T[k])).map(r=>r.data||r); }
    try { donors = await sbSelect('ksp_donors','select=id,name,email,phone,total_given'); } catch(e){ donors=[]; }
  }
  async function boot(){
    await loadConfig();
    const sess = await loadSession();
    if(cfg.url && cfg.key && sess && sess.refresh){
      try {
        session = await refreshSession(sess.refresh); await saveSession();
        await loadAllFromCloud(); online=true;
      } catch(e){ session=null; online=false; await loadLocal(); }
    } else {
      await loadLocal();
    }
    booting=false; ready=true; render();
  }
  async function persist(coll, items){
    if(online){ try{ await sbUpsert(T[coll], (Array.isArray(items)?items:[items]).map(coll==='members'?memberToRow:jsonToRow)); }catch(e){ toast('Sync failed: '+e.message); } }
    else { await saveLocal(coll); }
  }
  async function removeFrom(coll, ids){
    store[coll]=store[coll].filter(x=>!ids.includes(x.id));
    if(online){ try{ await sbDelete(T[coll],ids); }catch(e){ toast('Delete sync issue: '+e.message); } }
    else { await saveLocal(coll); }
  }
  async function getDonorTx(donorId){
    if(txCache[donorId]) return txCache[donorId];
    try { const rows=await sbSelect('ksp_transactions','select=id,date,amount,category,description&donor_id=eq.'+encodeURIComponent(donorId)+'&order=date.desc&limit=12'); txCache[donorId]=rows; return rows; }
    catch(e){ return []; }
  }

  function calendarView(){
    const y=calCursor.getFullYear(), mo=calCursor.getMonth(); const first=new Date(y,mo,1); const startDow=first.getDay(); const days=new Date(y,mo+1,0).getDate(); const t=todayISO();
    const byDay={}; store.events.forEach(e=>{ if(!e.date) return; const d=new Date(e.date+'T00:00:00'); if(d.getFullYear()===y&&d.getMonth()===mo)(byDay[d.getDate()]=byDay[d.getDate()]||[]).push(e); });
    let cells=''; for(let i=0;i<startDow;i++) cells+='<div class="cell empty"></div>';
    for(let d=1;d<=days;d++){ const iso=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const evs=(byDay[d]||[]).sort((a,b)=>(a.time||'').localeCompare(b.time||''));

  function stewardshipView(){

  function settingsModal(){
    if(!showSettings) return '';
    const sql=`-- Church tables, scoped to your account (run once in Supabase → SQL Editor)
create table if not exists cstone_members (
  id text primary key, user_id uuid not null default auth.uid(),
  name text not null, household text, status text default 'Visitor',
  phone text, email text, address text, join_date date,
  ministries jsonb default '[]', kw_stage text default 'Not enrolled',
  pledge numeric default 0, donor_id text, onboarding jsonb default '[]',
  notes text, created_at timestamptz default now()
);
create table if not exists cstone_announcements (id text primary key, user_id uuid not null default auth.uid(), data jsonb, created_at timestamptz default now());
create table if not exists cstone_events (id text primary key, user_id uuid not null default auth.uid(), data jsonb, created_at timestamptz default now());
create table if not exists cstone_groups (id text primary key, user_id uuid not null default auth.uid(), data jsonb, created_at timestamptz default now());
create table if not exists cstone_care (id text primary key, user_id uuid not null default auth.uid(), data jsonb, created_at timestamptz default now());

alter table cstone_members       enable row level security;
alter table cstone_announcements enable row level security;
alter table cstone_events        enable row level security;
alter table cstone_groups        enable row level security;
alter table cstone_care          enable row level security;

create policy "own" on cstone_members       for all using (user_id = auth.uid()) with check (user_id = auth.uid());
create policy "own" on cstone_announcements for all using (user_id = auth.uid()) with check (user_id = auth.uid());
create policy "own" on cstone_events        for all using (user_id = auth.uid()) with check (user_id = auth.uid());
create policy "own" on cstone_groups        for all using (user_id = auth.uid()) with check (user_id = auth.uid());
create policy "own" on cstone_care          for all using (user_id = auth.uid()) with check (user_id = auth.uid());`;
    return `<div class="overlay" data-settings-overlay><div class="modal">
      <div class="m-head"><h2>Connection & Account</h2><button class="x" data-act="closeSettings">&times;</button></div>
      <div class="m-body">
        <p style="color:var(--ink-soft);font-size:13.5px;line-height:1.6;margin-top:-2px">${online?`Signed in as <b>${esc(session.email||'')}</b>, synced to the same project as Kingdom Stewardship Pro.`:'Not signed in — using this device only.'}</p>
        <div class="field"><label>One-time table setup (Supabase → SQL Editor)</label><textarea rows="13" readonly style="font-family:ui-monospace,Menlo,monospace;font-size:10.5px;line-height:1.45;white-space:pre">${esc(sql)}</textarea></div>
        <p class="note" style="margin-top:0">These tables sit alongside your <code>ksp_*</code> tables and are locked to your login, exactly like the rest of your data. Giving is read live from <code>ksp_donors</code> / <code>ksp_transactions</code>; Cornerstone never writes to them.</p>
      </div>
      <div class="m-foot"><div>${online?`<button class="btn-ghost" data-act="signout" style="color:var(--rose);border-color:transparent">Sign out</button>`:''}</div>
        <div style="display:flex;gap:10px">${online?`<button class="btn-ghost" data-act="refresh">Refresh</button>`:`<button class="btn-primary" data-act="gotoLogin">Sign in</button>`}<button class="btn-ghost" data-act="closeSettings">Close</button></div></div>
    </div></div>`;
  }

  /* ================= RENDER ================= */
  function render(){
    if(booting){ root.innerHTML='<div class="loading">Loading…</div>'; return; }
    // gates
    if(!online && cfg.url && cfg.key && authMode!=='local' && !window.__cstoneLocal){ root.innerHTML=loginGate(); bindGate(); return; }
    if(!online && (!cfg.url||!cfg.key) && !window.__cstoneLocal){ root.innerHTML=setupGate(); bindGate(); return; }

    const views={dashboard,people:peopleView,membership:membershipView,groups:groupsView,events:eventsView,calendar:calendarView,care:careView,announcements:announcementsView,steward:stewardshipView};
    const body=(views[tab]||dashboard)();
    const TABS=[['dashboard','Dashboard'],['people','People'],['membership','Membership'],['groups','Groups'],['events','Events'],['calendar','Calendar'],['care','Care'],['announcements','Announcements'],['steward','Giving']];
    const cb=openCareCount();
    root.innerHTML=`<div class="wrap">
      <header class="app-head">
        <div class="brand"><div class="crest">${I.crest}</div><div><h1>Cornerstone</h1><div class="sub">Church Connection Hub</div></div></div>
        <div class="head-actions">
          <span class="sync-chip ${online?'on':'off'}" data-act="settings"><span class="dot"></span>${online?(session.email||'Synced'):'Local only'}</span>
          <button data-act="settings" class="icon-btn" title="Connection & account">${I.gear}</button>
        </div>
      </header>
      <nav class="tabs">${TABS.map(([k,l])=>`<button class="${tab===k?'active':''}" data-tab="${k}">${l}${k==='care'&&cb?`<span class="badge">${cb}</span>`:''}</button>`).join('')}</nav>
      ${body}
    </div>${modal()}${settingsModal()}`;
    bind();
  }

  function bindGate(){
    root.querySelectorAll('[data-act]').forEach(b=>b.onclick=()=>handleAct(b.dataset.act));
    const onEnter=(id,act)=>{ const e=root.querySelector(id); if(e) e.onkeydown=ev=>{ if(ev.key==='Enter') handleAct(act); }; };
    onEnter('#g-pass', authMode==='signup'?'doSignup':'doSignin'); onEnter('#g-key','saveCfg');
  }
  function bind(){
    root.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; selectMode=false; selected={}; render(); });
    root.querySelectorAll('[data-act]').forEach(b=>b.onclick=e=>{ e.stopPropagation(); handleAct(b.dataset.act); });
    root.querySelectorAll('[data-cal]').forEach(b=>b.onclick=()=>{ const v=b.dataset.cal; if(v==='today'){calCursor=new Date();calCursor.setDate(1);} else calCursor.setMonth(calCursor.getMonth()+Number(v)); render(); });
    const q=root.querySelector('#q'); if(q) q.oninput=()=>{ query=q.value; render(); const n=root.querySelector('#q'); if(n){n.focus(); n.setSelectionRange(query.length,query.length);} };
    const fs=root.querySelector('#fstatus'); if(fs) fs.onchange=()=>{ filterStatus=fs.value; render(); };
    root.querySelectorAll('[data-coll][data-id]').forEach(el=>el.onclick=ev=>{ ev.stopPropagation(); const coll=el.dataset.coll,id=el.dataset.id; if(coll==='members'&&selectMode){ toggleSelect(id); return; } openEdit(coll,id); });
    root.querySelectorAll('[data-advance]').forEach(b=>b.onclick=ev=>{ ev.stopPropagation(); advance(b.dataset.advance); });
    const ov=root.querySelector('[data-overlay]'); if(ov) ov.onclick=e=>{ if(e.target===ov){ editing=null; render(); } };
    const sov=root.querySelector('[data-settings-overlay]'); if(sov) sov.onclick=e=>{ if(e.target===sov){ showSettings=false; render(); } };
    root.querySelectorAll('[data-min]').forEach(t=>t.onclick=()=>{ readForm(); const a=editing.obj.ministries=editing.obj.ministries||[]; const i=a.indexOf(t.dataset.min); i>=0?a.splice(i,1):a.push(t.dataset.min); render(); });
    root.querySelectorAll('[data-gm]').forEach(t=>t.onclick=()=>{ readForm(); const a=editing.obj.memberIds=editing.obj.memberIds||[]; const i=a.indexOf(t.dataset.gm); i>=0?a.splice(i,1):a.push(t.dataset.gm); render(); });
    root.querySelectorAll('[data-step]').forEach(c=>c.onchange=()=>{ if(editing.obj.onboarding&&editing.obj.onboarding[+c.dataset.step]) editing.obj.onboarding[+c.dataset.step].done=c.checked; });
    const dsel=root.querySelector('#f-donor'); if(dsel) dsel.onchange=async()=>{ readForm(); editing.obj.donorId=dsel.value; if(dsel.value&&online&&!txCache[dsel.value]){ await getDonorTx(dsel.value); } render(); };
  }

  /* ================= ACTIONS ================= */
  function blank(coll){
    if(coll==='members') return {name:'',household:'',status:'Visitor',phone:'',email:'',address:'',joinDate:todayISO(),ministries:[],kwStage:'Not enrolled',pledge:0,donorId:'',onboarding:[],notes:''};
    if(coll==='announcements') return {title:'',body:'',date:todayISO(),pinned:false,category:'General'};
    if(coll==='events') return {title:'',date:todayISO(),time:'',location:'',category:'Service',groupId:'',description:''};
    if(coll==='groups') return {name:'',type:'Small Group',leader:'',meetingDay:'',meetingTime:'',location:'',memberIds:[],description:''};
    if(coll==='care') return {person:'',personId:'',type:'Grief / Bereavement',status:'Open',opened:todayISO(),followUp:'',assignedTo:'',private:false,notes:''};
    return {};
  }
  async function handleAct(act){
    if(act==='close'){ editing=null; render(); return; }
    if(act.startsWith('add-')){ editing={coll:act.slice(4),obj:blank(act.slice(4))}; render(); return; }
    // gate actions
    if(act==='saveCfg'){ cfg.url=root.querySelector('#g-url').value.trim(); cfg.key=root.querySelector('#g-key').value.trim(); if(!cfg.url||!cfg.key){ authErr='Enter both fields'; render(); return; } authErr=''; await saveConfig(); authMode='signin'; render(); return; }
    if(act==='useLocal'){ window.__cstoneLocal=true; await loadLocal(); online=false; render(); return; }
    if(act==='editCfg'){ cfg={url:'',key:''}; saveConfig(); render(); return; }
    if(act==='toSignup'){ authMode='signup'; authErr=''; render(); return; }
    if(act==='toSignin'){ authMode='signin'; authErr=''; render(); return; }
    if(act==='gotoLogin'){ showSettings=false; window.__cstoneLocal=false; online=false; render(); return; }
    if(act==='doSignin'||act==='doSignup'){ await doAuth(act==='doSignup'); return; }
    if(act==='signout'){ session=null; online=false; await clearSession(); showSettings=false; await loadLocal(); window.__cstoneLocal=false; render(); return; }
    if(act==='settings'){ showSettings=true; render(); return; }
    if(act==='closeSettings'){ showSettings=false; render(); return; }
    if(act==='refresh'){ try{ await loadAllFromCloud(); toast('Refreshed'); }catch(e){ toast('Refresh failed'); } render(); return; }
    const map={ save:saveRecord, delete:deleteRecord, selectmode:()=>{selectMode=true;selected={};render();}, cancelselect:()=>{selectMode=false;selected={};render();}, selectall:selectAllVisible, deleteselected:deleteSelected };
    if(map[act]) map[act]();
  }
  async function doAuth(isSignup){
    const email=root.querySelector('#g-email').value.trim(); const pass=root.querySelector('#g-pass').value;
    if(!email||!pass){ authErr='Enter email and password'; render(); return; }
    busy=true; authErr=''; render();
    try{
      const s = isSignup ? await signUp(email,pass) : await signIn(email,pass);
      if(!s){ busy=false; authErr='Check your email to confirm, then sign in.'; authMode='signin'; render(); return; }
      session=s; await saveSession(); await loadAllFromCloud(); online=true; busy=false; window.__cstoneLocal=false; render(); toast('Signed in');
    }catch(e){ busy=false; authErr=e.message||'Failed'; render(); }
  }

  function openEdit(coll,id){ const o=byId(coll,id); if(o){ editing={coll,obj:JSON.parse(JSON.stringify(o))}; render(); if(coll==='members'&&editing.obj.donorId&&online&&!txCache[editing.obj.donorId]){ getDonorTx(editing.obj.donorId).then(()=>{ if(editing&&editing.obj.id===id) render(); }); } } }
  function readForm(){
    if(!editing) return; const {coll,obj}=editing; const g=id=>{const e=root.querySelector(id); return e?e.value:undefined;}; const ck=id=>{const e=root.querySelector(id); return e?e.checked:false;};
    if(coll==='members'){ obj.name=(g('#f-name')||'').trim(); obj.household=(g('#f-house')||'').trim(); obj.status=g('#f-status')||obj.status; obj.phone=(g('#f-phone')||'').trim(); obj.email=(g('#f-email')||'').trim(); obj.address=(g('#f-addr')||'').trim(); obj.joinDate=g('#f-join')||obj.joinDate; obj.kwStage=g('#f-kw')||obj.kwStage; obj.pledge=Number(g('#f-pledge'))||0; const dv=g('#f-donor'); if(dv!==undefined) obj.donorId=dv; obj.notes=(g('#f-notes')||'').trim(); root.querySelectorAll('[data-step]').forEach(c=>{ if(obj.onboarding&&obj.onboarding[+c.dataset.step]) obj.onboarding[+c.dataset.step].done=c.checked; }); }
    else if(coll==='announcements'){ obj.title=(g('#a-title')||'').trim(); obj.date=g('#a-date')||obj.date; obj.category=g('#a-cat')||obj.category; obj.pinned=ck('#a-pin'); obj.body=(g('#a-body')||'').trim(); }
    else if(coll==='events'){ obj.title=(g('#e-title')||'').trim(); obj.date=g('#e-date')||obj.date; obj.time=g('#e-time')||''; obj.location=(g('#e-loc')||'').trim(); obj.category=g('#e-cat')||obj.category; obj.groupId=g('#e-group')||''; obj.description=(g('#e-desc')||'').trim(); }
    else if(coll==='groups'){ obj.name=(g('#g-name')||'').trim(); obj.type=g('#g-type')||obj.type; obj.leader=(g('#g-leader')||'').trim(); obj.meetingDay=(g('#g-day')||'').trim(); obj.meetingTime=(g('#g-time')||'').trim(); obj.location=(g('#g-loc')||'').trim(); obj.description=(g('#g-desc')||'').trim(); }
    else if(coll==='care'){ obj.person=(g('#c-person')||'').trim(); obj.personId=g('#c-personid')||''; obj.type=g('#c-type')||obj.type; obj.status=g('#c-status')||obj.status; obj.opened=g('#c-opened')||obj.opened; obj.followUp=g('#c-follow')||''; obj.assignedTo=(g('#c-assigned')||'').trim(); obj.private=ck('#c-private'); obj.notes=(g('#c-notes')||'').trim(); }
  }
  function saveRecord(){
    readForm(); const {coll,obj}=editing;
    if(coll==='members'&&!obj.name){ toast('Enter a name'); return; }
    if((coll==='announcements'||coll==='events')&&!obj.title){ toast('Enter a title'); return; }
    if(coll==='groups'&&!obj.name){ toast('Enter a group name'); return; }
    if(coll==='care'&&!obj.person&&!obj.personId){ toast('Enter who this is for'); return; }
    if(coll==='care'&&!obj.person&&obj.personId) obj.person=personName(obj.personId);
    if(byId(coll,obj.id)){ store[coll][store[coll].findIndex(x=>x.id===obj.id)]=obj; } else { obj.id=obj.id||uid(); store[coll].push(obj); }
    const saved=obj; editing=null; render(); persist(coll,saved); toast(online?'Saved & synced':'Saved');
  }
  function deleteRecord(){ const {coll,obj}=editing; if(!obj.id){ editing=null; render(); return; } if(!confirm('Delete this record?')) return; editing=null; render(); removeFrom(coll,[obj.id]); toast('Removed'); }
  function advance(id){ const m=byId('members',id); if(!m) return; if(m.status==='Visitor') m.status='Regular'; else if(m.status==='Regular'){ m.status='Member'; if(!m.onboarding||!m.onboarding.length) m.onboarding=WELCOME_STEPS.map(l=>({label:l,done:false})); } render(); persist('members',m); toast(m.name+' → '+m.status); }

  function toggleSelect(id){ selected[id]?delete selected[id]:selected[id]=true; render(); }
  function selectAllVisible(){ const list=visibleMembers(); const allOn=list.length&&list.every(m=>selected[m.id]); allOn?list.forEach(m=>delete selected[m.id]):list.forEach(m=>selected[m.id]=true); render(); }
  function deleteSelected(){ const ids=Object.keys(selected).filter(id=>byId('members',id)); if(!ids.length) return; if(!confirm('Delete '+ids.length+' record'+(ids.length>1?'s':'')+'?')) return; selected={}; selectMode=false; render(); removeFrom('members',ids); toast('Deleted '+ids.length); }

  boot();
})();
</script>
